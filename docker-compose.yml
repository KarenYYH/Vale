services:
  vale:
    build: .
    ports:
      - "4567:4567"   # REST API + PWA
      - "4568:4568"   # MCP HTTP transport
    volumes:
      - ./workspace:/workspace
    environment:
      # REQUIRED in production: server refuses to start without a real secret
      # (>= 32 chars). Generate one with: openssl rand -hex 32
      - "VALE_JWT_SECRET=${VALE_JWT_SECRET:?VALE_JWT_SECRET is required - generate with: openssl rand -hex 32}"
      # CORS allow-list (comma-separated). Defaults to localhost only if unset.
      - "VALE_CORS_ORIGINS=${VALE_CORS_ORIGINS:-}"
      - VALE_AGENT_KEY=${VALE_AGENT_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4567/api/ping').then(r=>process.exit(r.ok?0:1))"]
      interval: 30s
      timeout: 5s
      retries: 3
